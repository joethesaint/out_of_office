name: Sync Build to Portfolio Repository

on:
  push:
    branches:
      - main

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Out of Office 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies 🔧
        run: npm ci || npm install

      - name: Build static bundle with base path 🏗️
        run: npx vite build --base=/out-of-office/

      - name: Checkout Portfolio Repository 🚀
        uses: actions/checkout@v4
        with:
          repository: joethesaint/joethesaint.github.io
          token: ${{ secrets.PORTFOLIO_PAT || secrets.GITHUB_TOKEN }}
          path: portfolio

      - name: Copy build artifacts to portfolio 📂
        run: |
          mkdir -p portfolio/public/out-of-office
          rm -rf portfolio/public/out-of-office/*
          cp -r dist/* portfolio/public/out-of-office/

      - name: Commit and push to portfolio 📤
        run: |
          cd portfolio
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/out-of-office/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync out_of_office build"
            git push origin main
          fi
