<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Isometric Cube Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB3EC"/>
      <stop offset="100%" stop-color="#E0568F"/>
    </linearGradient>
    <linearGradient id="creamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3EFEA"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#181818" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)" stroke="#181818" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- Top Face (Cream / Heart decal) -->
    <polygon points="32,6 56,19 32,32 8,19" fill="url(#creamGrad)"/>
    <!-- Heart decal on top face -->
    <path d="M32,23 C30,18 24,18 24,21 C24,24 32,28 32,28 C32,28 40,24 40,21 C40,18 34,18 32,23 Z" fill="#E0568F" stroke="none"/>

    <!-- Left Front Face (Blue / Ocean Wave) -->
    <polygon points="8,19 32,32 32,58 8,45" fill="url(#blueGrad)"/>
    <!-- Ocean Wave Decal -->
    <path d="M14,35 Q20,32 26,38" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M14,43 Q20,40 26,46" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Right Front Face (Pink / OOO Text) -->
    <polygon points="56,19 32,32 32,58 56,45" fill="url(#pinkGrad)"/>
    <!-- OOO Dots Decal -->
    <circle cx="44" cy="33" r="2.5" fill="#181818" stroke="none"/>
    <circle cx="44" cy="41" r="2.5" fill="#181818" stroke="none"/>
    <circle cx="44" cy="49" r="2.5" fill="#181818" stroke="none"/>
  </g>
</svg>